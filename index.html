<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Photosensitivity Flicker Test</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --panel: #111;
    --border: #222;
    --accent: #00ff88;
    --danger: #ff3344;
    --warn: #ffaa00;
    --muted: #444;
    --text: #ccc;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Barlow Condensed', sans-serif;
  }

  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--sans); }

  #stimulus {
    position: fixed; inset: 0;
    background: black;
    z-index: 0;
    display: none;
  }
  #stimulus.active { display: block; }

  #ui {
    position: fixed; inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    pointer-events: none;
  }

  #topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px;
    background: rgba(10,10,10,0.92);
    border-bottom: 1px solid var(--border);
    pointer-events: all;
    backdrop-filter: blur(4px);
  }
  #topbar .logo {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
  }
  #topbar .logo span { color: var(--muted); }
  #freq-display {
    font-family: var(--mono);
    font-size: 32px;
    letter-spacing: -1px;
    color: white;
  }
  #freq-display .unit { font-size: 14px; color: var(--muted); margin-left: 4px; }
  #status-indicator {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: 11px; letter-spacing: 2px;
    text-transform: uppercase;
  }
  #status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted);
    transition: background 0.2s;
  }
  #status-dot.running { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  #panel {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(10,10,10,0.95);
    border-top: 1px solid var(--border);
    padding: 16px 20px 20px;
    pointer-events: all;
    backdrop-filter: blur(8px);
    transition: transform 0.3s ease;
  }
  #panel.hidden { transform: translateY(calc(100% - 40px)); }

  #panel-toggle {
    position: absolute; top: -1px; left: 50%; transform: translateX(-50%);
    background: var(--panel);
    border: 1px solid var(--border);
    border-bottom: none;
    padding: 4px 24px;
    font-family: var(--mono); font-size: 10px; letter-spacing: 2px;
    color: var(--muted); cursor: pointer;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  #panel-toggle:hover { color: var(--accent); }

  .controls-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 16px;
    margin-top: 8px;
  }

  .ctrl-group { display: flex; flex-direction: column; gap: 8px; }
  .ctrl-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .ctrl-value { font-family: var(--mono); font-size: 13px; color: var(--accent); }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%; height: 3px;
    background: var(--border);
    outline: none; cursor: pointer;
    border-radius: 2px;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    cursor: grab;
  }
  input[type=range].danger::-webkit-slider-thumb { background: var(--danger); box-shadow: 0 0 6px var(--danger); }

  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn {
    padding: 6px 14px;
    font-family: var(--mono); font-size: 11px; letter-spacing: 2px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.active { background: var(--accent); color: black; border-color: var(--accent); }
  .btn.danger-btn { border-color: #331119; }
  .btn.danger-btn:hover { background: var(--danger); color: white; border-color: var(--danger); }

  #big-btn-row {
    display: flex; gap: 12px; align-items: center;
    margin-top: 14px;
  }
  #start-btn {
    flex: 1;
    padding: 14px;
    font-family: var(--mono); font-size: 14px; letter-spacing: 4px;
    border: 1px solid var(--accent);
    background: transparent; color: var(--accent);
    cursor: pointer; text-transform: uppercase;
    transition: all 0.15s;
  }
  #start-btn:hover { background: var(--accent); color: black; }
  #start-btn.running { border-color: var(--danger); color: var(--danger); }
  #start-btn.running:hover { background: var(--danger); color: white; }

  #sweep-btn {
    padding: 14px 20px;
    font-family: var(--mono); font-size: 11px; letter-spacing: 2px;
    border: 1px solid var(--muted);
    background: transparent; color: var(--muted);
    cursor: pointer; text-transform: uppercase;
    transition: all 0.15s;
  }
  #sweep-btn:hover { border-color: var(--warn); color: var(--warn); }
  #sweep-btn.active { border-color: var(--warn); color: black; background: var(--warn); }

  #timer-display {
    font-family: var(--mono); font-size: 20px; color: white;
    letter-spacing: 2px;
  }

  #patternCanvas {
    position: fixed; inset: 0;
    z-index: 1;
    display: none;
  }
  #patternCanvas.active { display: block; }

  #esc-hint {
    position: fixed; top: 60px; right: 20px;
    font-family: var(--mono); font-size: 10px; letter-spacing: 2px;
    color: rgba(255,255,255,0.2);
    z-index: 30;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="esc-hint">ESC → STOP</div>
<div id="stimulus"></div>
<canvas id="patternCanvas"></canvas>

<div id="ui">
  <div id="topbar">
    <div class="logo">FLICKER<span>/</span>TEST <span style="font-size:9px">v2</span></div>
    <div id="freq-display">–– <span class="unit">Hz</span></div>
    <div id="status-indicator">
      <div id="status-dot"></div>
      <span id="status-text">STANDBY</span>
    </div>
  </div>

  <div id="panel">
    <div id="panel-toggle" onclick="togglePanel()">▲ CONTROLS</div>

    <div class="controls-grid">

      <div class="ctrl-group" style="grid-column: span 2;">
        <div class="ctrl-label">Frequency <span class="ctrl-value" id="freq-val">1.0 Hz</span></div>
        <input type="range" id="freq-slider" min="0.5" max="50" step="0.5" value="1"
          oninput="setFreq(this.value)">
        <div class="btn-row">
          <button class="btn" onclick="setFreq(1)">1</button>
          <button class="btn" onclick="setFreq(3)">3</button>
          <button class="btn" onclick="setFreq(6)">6</button>
          <button class="btn" onclick="setFreq(10)">10</button>
          <button class="btn" onclick="setFreq(15)">15</button>
          <button class="btn" onclick="setFreq(20)">20</button>
          <button class="btn" onclick="setFreq(25)">25</button>
          <button class="btn danger-btn" onclick="setFreq(30)">30</button>
          <button class="btn danger-btn" onclick="setFreq(50)">50</button>
        </div>
      </div>

      <div class="ctrl-group">
        <div class="ctrl-label">Pattern</div>
        <div class="btn-row" style="flex-direction:column; gap:4px;">
          <button class="btn active" id="pat-fullscreen" onclick="setPattern('fullscreen')">Full Screen</button>
          <button class="btn" id="pat-checker" onclick="setPattern('checker')">Checkerboard</button>
          <button class="btn" id="pat-radial" onclick="setPattern('radial')">Radial</button>
          <button class="btn" id="pat-stripes" onclick="setPattern('stripes')">H-Stripes</button>
        </div>
      </div>

      <div class="ctrl-group">
        <div class="ctrl-label">Colors</div>
        <div class="btn-row" style="flex-direction:column; gap:4px;">
          <button class="btn active" id="col-bw" onclick="setColors('bw')">Black / White</button>
          <button class="btn" id="col-rb" onclick="setColors('rb')">Red / Black</button>
          <button class="btn" id="col-gray" onclick="setColors('gray')">Gray Scale</button>
        </div>
        <div class="ctrl-label" style="margin-top:8px">Duty Cycle <span class="ctrl-value" id="duty-val">50%</span></div>
        <input type="range" id="duty-slider" min="10" max="90" step="5" value="50"
          oninput="setDuty(this.value)">
      </div>

    </div>

    <div class="controls-grid" style="margin-top:12px; grid-template-columns: 1fr 1fr 1fr 1fr;">
      <div class="ctrl-group">
        <div class="ctrl-label">Sweep From <span class="ctrl-value" id="sweep-from-val">1 Hz</span></div>
        <input type="range" id="sweep-from" min="0.5" max="30" step="0.5" value="1"
          oninput="sweepFrom=+this.value; document.getElementById('sweep-from-val').textContent=this.value+' Hz'">
      </div>
      <div class="ctrl-group">
        <div class="ctrl-label">Sweep To <span class="ctrl-value" id="sweep-to-val">30 Hz</span></div>
        <input type="range" id="sweep-to" min="1" max="50" step="0.5" value="30"
          oninput="sweepTo=+this.value; document.getElementById('sweep-to-val').textContent=this.value+' Hz'">
      </div>
      <div class="ctrl-group">
        <div class="ctrl-label">Sweep Duration <span class="ctrl-value" id="sweep-dur-val">10 s</span></div>
        <input type="range" id="sweep-dur" min="2" max="60" step="1" value="10"
          oninput="sweepDur=+this.value; document.getElementById('sweep-dur-val').textContent=this.value+' s'">
      </div>
      <div class="ctrl-group">
        <div class="ctrl-label">Session Timer</div>
        <div id="timer-display">00:00</div>
      </div>
    </div>

    <div id="big-btn-row">
      <button id="start-btn" onclick="toggleRun()">▶ START</button>
      <button id="sweep-btn" onclick="toggleSweep()">⟳ SWEEP MODE</button>
    </div>
  </div>
</div>

<script>
let running = false;
let sweeping = false;
let currentFreq = 1;
let dutyCycle = 0.5;
let pattern = 'fullscreen';
let colors = { on: '#ffffff', off: '#000000' };
let colorMode = 'bw';

let sweepFrom = 1, sweepTo = 30, sweepDur = 10;
let sessionStart = null;
let timerInterval = null;
let panelVisible = true;
let frameId = null;
let startTime = null;
let flickerState = false;

const canvas = document.getElementById('patternCanvas');
const ctx = canvas.getContext('2d');
const stimulus = document.getElementById('stimulus');

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function setFreq(v) {
  currentFreq = +v;
  document.getElementById('freq-slider').value = v;
  document.getElementById('freq-val').textContent = parseFloat(v).toFixed(1) + ' Hz';
  updateFreqDisplay();
  updateSliderColor();
}

function setDuty(v) {
  dutyCycle = v / 100;
  document.getElementById('duty-val').textContent = v + '%';
}

function setPattern(p) {
  pattern = p;
  ['fullscreen','checker','radial','stripes'].forEach(id => {
    document.getElementById('pat-' + id).classList.toggle('active', id === p);
  });
}

function setColors(c) {
  colorMode = c;
  ['bw','rb','gray'].forEach(id => {
    document.getElementById('col-' + id).classList.toggle('active', id === c);
  });
  if (c === 'bw')   { colors = { on: '#ffffff', off: '#000000' }; }
  else if (c === 'rb')   { colors = { on: '#ff1122', off: '#000000' }; }
  else if (c === 'gray') { colors = { on: '#aaaaaa', off: '#222222' }; }
}

function updateSliderColor() {
  const s = document.getElementById('freq-slider');
  s.className = currentFreq >= 20 ? 'danger' : '';
}

function updateFreqDisplay() {
  const d = document.getElementById('freq-display');
  d.innerHTML = `${currentFreq.toFixed(1)} <span class="unit">Hz</span>`;
  d.style.color = currentFreq >= 20 ? '#ff3344' : currentFreq >= 10 ? '#ffaa00' : 'white';
}

function drawFlicker(state) {
  if (pattern === 'fullscreen') {
    canvas.style.display = 'none';
    stimulus.style.display = '';
    stimulus.style.backgroundColor = state ? colors.on : colors.off;
    return;
  }

  canvas.style.display = 'block';
  stimulus.style.display = 'none';

  const w = canvas.width, h = canvas.height;
  const c1 = state ? colors.on : colors.off;
  const c2 = state ? colors.off : colors.on;

  ctx.clearRect(0, 0, w, h);

  if (pattern === 'checker') {
    const size = 80;
    for (let x = 0; x < w; x += size) {
      for (let y = 0; y < h; y += size) {
        const isEven = ((Math.floor(x/size) + Math.floor(y/size)) % 2 === 0);
        ctx.fillStyle = isEven ? c1 : c2;
        ctx.fillRect(x, y, size, size);
      }
    }
  } else if (pattern === 'radial') {
    const rings = 12;
    const cx = w/2, cy = h/2;
    const maxR = Math.sqrt(cx*cx + cy*cy);
    for (let i = rings; i >= 0; i--) {
      ctx.beginPath();
      ctx.arc(cx, cy, (i/rings)*maxR, 0, Math.PI*2);
      ctx.fillStyle = (i % 2 === 0) ? c1 : c2;
      ctx.fill();
    }
  } else if (pattern === 'stripes') {
    const stripeH = 60;
    for (let y = 0; y < h; y += stripeH) {
      ctx.fillStyle = (Math.floor(y/stripeH) % 2 === 0) ? c1 : c2;
      ctx.fillRect(0, y, w, stripeH);
    }
  }
}

function loop(ts) {
  if (!running) return;
  if (!startTime) startTime = ts;
  const elapsed = (ts - startTime) / 1000;

  if (sweeping) {
    const t = elapsed % sweepDur;
    const freq = sweepFrom + (sweepTo - sweepFrom) * (t / sweepDur);
    setFreq(freq.toFixed(1));
  }

  const period = 1 / currentFreq;
  const onTime = period * dutyCycle;
  const cycleTime = elapsed % period;
  flickerState = cycleTime < onTime;

  drawFlicker(flickerState);
  frameId = requestAnimationFrame(loop);
}

function toggleRun() {
  running ? stopRun() : startRun();
}

function startRun() {
  running = true;
  startTime = null;
  flickerState = false;

  stimulus.classList.add('active');
  if (pattern !== 'fullscreen') canvas.classList.add('active');

  document.getElementById('start-btn').textContent = '■ STOP';
  document.getElementById('start-btn').classList.add('running');
  document.getElementById('status-dot').className = 'running';
  document.getElementById('status-text').textContent = 'RUNNING';

  sessionStart = Date.now();
  timerInterval = setInterval(updateTimer, 500);
  frameId = requestAnimationFrame(loop);
}

function stopRun() {
  running = false;
  sweeping = false;
  if (frameId) cancelAnimationFrame(frameId);

  stimulus.classList.remove('active');
  canvas.classList.remove('active');
  stimulus.style.backgroundColor = 'black';
  canvas.style.display = 'none';

  document.getElementById('start-btn').textContent = '▶ START';
  document.getElementById('start-btn').classList.remove('running');
  document.getElementById('status-dot').className = '';
  document.getElementById('status-text').textContent = 'STANDBY';
  document.getElementById('sweep-btn').classList.remove('active');
  document.getElementById('sweep-btn').textContent = '⟳ SWEEP MODE';

  clearInterval(timerInterval);
}

function toggleSweep() {
  sweeping = !sweeping;
  const btn = document.getElementById('sweep-btn');
  btn.classList.toggle('active', sweeping);
  btn.textContent = sweeping ? '■ SWEEP ON' : '⟳ SWEEP MODE';
  if (sweeping && !running) startRun();
}

function updateTimer() {
  if (!sessionStart) return;
  const s = Math.floor((Date.now() - sessionStart) / 1000);
  const m = Math.floor(s / 60);
  document.getElementById('timer-display').textContent =
    String(m).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}

function togglePanel() {
  panelVisible = !panelVisible;
  document.getElementById('panel').classList.toggle('hidden', !panelVisible);
  document.getElementById('panel-toggle').textContent = panelVisible ? '▼ CONTROLS' : '▲ CONTROLS';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') stopRun();
  if (e.key === ' ') { e.preventDefault(); toggleRun(); }
});

setFreq(1);
setColors('bw');
setPattern('fullscreen');
</script>
</body>
</html>
